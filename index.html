<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Murray State Baseball Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Anton&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }
body {
font-family: 'Barlow', sans-serif;
background: #001030;
min-height: 100vh;
width: 100%;
overflow-x: hidden;
padding: 20px 14px 48px;
}
.card {
background: #CFB53B;
border-radius: 28px;
overflow: hidden;
max-width: 560px;
margin: 0 auto;
box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.masthead {
padding: 20px 24px 20px;
text-align: center;
background: #CFB53B;
}
.season-badge {
font-family: 'Barlow', sans-serif;
font-size: 9px;
letter-spacing: 3px;
color: #7a6820;
text-transform: uppercase;
margin-top: 8px;
}
.site-title {
font-family: 'Abril Fatface', serif;
font-size: clamp(52px, 13vw, 68px);
color: #002147;
line-height: 0.9;
letter-spacing: 1px;
}
.rule-wrap {
margin: 14px 0 10px;
display: flex;
flex-direction: column;
gap: 3px;
}
.rule-thick { height: 3px; background: #002147; border-radius: 1px; }
.rule-thin  { height: 1px; background: #002147; }
.stats-bar {
display: flex;
border: 1px solid #002147;
margin: 0 24px 24px;
border-radius: 2px;
}
.stat-item {
flex: 1;
padding: 12px 8px;
text-align: center;
border-right: 1px solid #002147;
}
.stat-item:last-child { border-right: none; }
.stat-num {
font-family: 'Anton', sans-serif;
font-size: clamp(24px, 6vw, 30px);
color: #002147;
display: block;
line-height: 1;
}
.stat-lbl {
font-family: 'Barlow', sans-serif;
font-size: 8px;
color: #7a6820;
text-transform: uppercase;
letter-spacing: 2px;
margin-top: 3px;
display: block;
}
.section {
background: #002147;
padding: 5px 24px;
}
.section-label {
font-family: 'Anton', sans-serif;
font-size: 11px;
letter-spacing: 4px;
text-transform: uppercase;
color: #CFB53B;
}
.tool-list {
padding: 6px 20px 10px;
background: #CFB53B;
}
.tool-card {
display: flex;
align-items: center;
padding: 14px 4px;
gap: 14px;
text-decoration: none;
border-bottom: 1px solid #b89e2a;
-webkit-tap-highlight-color: transparent;
-webkit-transition: background 0.1s;
transition: background 0.1s;
border-radius: 4px;
}
.tool-card:last-child { border-bottom: none; }
.tool-card:active { background: rgba(0,0,0,0.08); }
.tool-icon {
width: 48px;
height: 48px;
border: 1px solid #002147;
border-radius: 4px;
display: flex;
align-items: center;
justify-content: center;
font-size: 24px;
flex-shrink: 0;
background: rgba(255,255,255,0.3);
}
.tool-info { flex: 1; min-width: 0; }
.tool-name {
font-family: 'Anton', sans-serif;
font-size: 16px;
color: #002147;
letter-spacing: 0.5px;
text-transform: uppercase;
line-height: 1.1;
}
.tool-desc {
font-family: 'Barlow', sans-serif;
font-size: 12px;
color: #5a4a10;
margin-top: 3px;
font-style: italic;
line-height: 1.3;
}
.tool-badge {
font-family: 'Barlow', sans-serif;
font-size: 9px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
padding: 3px 9px;
border: 1px solid #002147;
color: #002147;
background: transparent;
flex-shrink: 0;
border-radius: 2px;
}
.card-footer {
background: #002147;
padding: 16px 24px 20px;
text-align: center;
}
.card-footer p {
font-family: 'Barlow', sans-serif;
font-size: 8px;
color: #4a6a8a;
letter-spacing: 2px;
text-transform: uppercase;
line-height: 2;
}
.footer-title {
font-family: 'Abril Fatface', serif;
font-size: 22px;
color: #CFB53B;
opacity: 0.12;
margin-top: 10px;
letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="card">
  <div class="masthead">
    <div class="site-title">Baseball</div>
    <div class="season-badge">2026 OVC Season · Murray State Racers</div>
    <div class="rule-wrap">
      <div class="rule-thick"></div>
      <div class="rule-thin"></div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-num" id="dbPitches">—</span>
      <span class="stat-lbl">Pitches</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="dbGames">—</span>
      <span class="stat-lbl">Games</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="dbPitchers">—</span>
      <span class="stat-lbl">Pitchers</span>
    </div>
  </div>
  <div class="section"><div class="section-label">Data</div></div>
  <div class="tool-list">
    <a href="ms_csv_uploader.html" class="tool-card">
      <div class="tool-icon">⬆️​​​​​​​​​​​​​​​​
